services:
  - type: web
    name: aura-store-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5055
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: ./data/ecommerce.db
      - key: CLIENT_ORIGIN
        value: https://your-frontend-url.vercel.app
